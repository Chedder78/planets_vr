<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GPK ULTRA 3D | Walkable Gallery</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Bangers', cursive;
            background-color: #1a1a1a;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #enter-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: #ff3e41;
            color: #ffde37;
            border: 5px solid #1a1a1a;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10000;
            border-radius: 10px;
            font-family: 'Bangers', cursive;
            text-transform: uppercase;
        }
        #loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #ffde37;
            font-family: 'Bangers', cursive;
        }
        #loading-screen.hidden { display: none; }
        .progress-bar {
            width: 300px; height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 20px;
            overflow: hidden; border: 2px solid #ffde37;
        }
        .progress-fill {
            height: 100%; background: #ff3e41;
            width: 0%; transition: width 0.3s;
        }
        .ui-panel {
            position: fixed;
            background: rgba(26, 26, 26, 0.95);
            border: 3px solid #ffde37;
            border-radius: 10px; padding: 15px;
            z-index: 10000; color: white;
            max-width: 300px;
            font-family: Arial, sans-serif;
        }
        #card-details { top: 20px; right: 20px; display: none; }
        #recalibrate-btn {
            position: fixed;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(26,26,26,0.8);
            border: 2px solid #ffde37;
            color: #ffde37; font-size: 20px;
            cursor: pointer; z-index: 10000;
            display: none;
        }
        @media (max-width: 480px) {
            #enter-button { font-size: 1.5rem; padding: 15px 30px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <h1 style="font-size:3rem;margin-bottom:20px;">GPK ULTRA 3D</h1>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div id="loading-text">Loading Gallery...</div>
    </div>
    
    <button id="enter-button">ENTER GALLERY</button>
    <button id="recalibrate-btn">🎯</button>
    
    <div id="card-details" class="ui-panel">
        <h2 style="color:#ffde37;margin-bottom:10px;">CARD DETAILS</h2>
        <p><strong>Title:</strong> <span id="card-title"></span></p>
        <p><strong>Series:</strong> <span id="card-series"></span></p>
        <p><strong>Value:</strong> $<span id="card-value"></span></p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        scene.add(new THREE.AmbientLight(0x404060));
        const dirLight = new THREE.DirectionalLight(0xffde37, 0.8);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // Stars
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i += 3) {
            starsPos[i] = (Math.random() - 0.5) * 200;
            starsPos[i+1] = (Math.random() - 0.5) * 200;
            starsPos[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1}));
        scene.add(stars);
        
        // Floor
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(8, 32),
            new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, side: THREE.DoubleSide })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);
        scene.add(new THREE.GridHelper(16, 20, 0xffde37, 0x333333));
        
        // Card data
        const cardData = {
            "1": { title: "Pompa Paulie", series: "GPK Ultra 3D", value: 150.00 },
            "2": { title: "Atomic Adam", series: "GPK Ultra 3D", value: 125.00 },
            "3": { title: "Bionic Betty", series: "GPK Ultra 3D", value: 200.00 },
            "4": { title: "Cosmic Carl", series: "GPK Ultra 3D", value: 175.00 },
            "5": { title: "Digital Dave", series: "GPK Ultra 3D", value: 225.00 },
            "6": { title: "Electric Eve", series: "GPK Ultra 3D", value: 250.00 },
            "7": { title: "Fusion Frank", series: "GPK Ultra 3D", value: 200.00 },
            "8": { title: "Gamma Gary", series: "GPK Ultra 3D", value: 275.00 },
            "9": { title: "Hologram Helen", series: "GPK Ultra 3D", value: 300.00 },
            "10": { title: "Ion Ivan", series: "GPK Ultra 3D", value: 325.00 },
            "11": { title: "Jupiter Jane", series: "GPK Ultra 3D", value: 250.00 },
            "12": { title: "Kinetic Kyle", series: "GPK Ultra 3D", value: 225.00 },
        };
        
        // Loading
        const loadingManager = new THREE.LoadingManager();
        const progressFill = document.getElementById('progress-fill');
        const loadingText = document.getElementById('loading-text');
        const loadingScreen = document.getElementById('loading-screen');
        
        loadingManager.onProgress = (url, loaded, total) => {
            const pct = Math.round((loaded / total) * 100);
            progressFill.style.width = pct + '%';
            loadingText.textContent = `Loading: ${pct}%`;
        };
        
        loadingManager.onLoad = () => {
            loadingScreen.classList.add('hidden');
            document.getElementById('enter-button').style.display = 'block';
        };
        
        const textureLoader = new THREE.TextureLoader(loadingManager);
        const cardImages = [
            'PompaPaulie.png','20250503011555.png','20250503034156.png',
            '20250503012558.png','20250503022823.png','20250503032454.png',
            '20250503035601.png','20250503214217.png','20250503212559.png',
            '20250507032544.png',null,null
        ];
        
        // Walls with cards
        function createWall(pos, rotY, startIdx) {
            const group = new THREE.Group();
            const wall = new THREE.Mesh(
                new THREE.BoxGeometry(5, 4, 0.1),
                new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5 })
            );
            wall.receiveShadow = true;
            group.add(wall);
            
            const frameMat = new THREE.MeshStandardMaterial({ 
                color: 0xffde37, roughness: 0.3, metalness: 0.7, emissive: new THREE.Color(0x332200)
            });
            
            [-2, 0, 2].forEach((x, i) => {
                const idx = startIdx + i;
                
                const frame = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.05), frameMat);
                frame.position.set(x, 0.5, 0.06);
                group.add(frame);
                
                const mat = new THREE.MeshStandardMaterial({ roughness: 0.4 });
                if (cardImages[idx]) {
                    mat.map = textureLoader.load(cardImages[idx]);
                } else {
                    const c = document.createElement('canvas');
                    c.width = 512; c.height = 712;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#ff3e41'; ctx.fillRect(0,0,512,712);
                    ctx.font = 'bold 40px Arial'; ctx.fillStyle = '#ffde37';
                    ctx.textAlign = 'center'; ctx.fillText(`Card ${idx+1}`,256,356);
                    mat.map = new THREE.CanvasTexture(c);
                }
                
                const card = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.1, 0.01), mat);
                card.position.set(x, 0.5, 0.09);
                card.userData = { type: 'card', cardId: String(idx+1) };
                group.add(card);
            });
            
            group.position.copy(pos);
            group.rotation.y = rotY;
            return group;
        }
        
        scene.add(createWall(new THREE.Vector3(0, 1.5, -4.5), 0, 0));
        scene.add(createWall(new THREE.Vector3(4.5, 1.5, 0), Math.PI/2, 3));
        scene.add(createWall(new THREE.Vector3(0, 1.5, 4.5), Math.PI, 6));
        scene.add(createWall(new THREE.Vector3(-4.5, 1.5, 0), -Math.PI/2, 9));
        
        // Ceiling card
        const ceilingCard = new THREE.Group();
        ceilingCard.position.set(0, 5.5, 0);
        const chain = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 1.5),
            new THREE.MeshStandardMaterial({ color: 0xffde37, metalness: 0.8 })
        );
        chain.position.y = 0.75;
        ceilingCard.add(chain);
        
        const featTex = textureLoader.load('PompaPaulie.png');
        const featCard = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 1.6, 0.05),
            new THREE.MeshStandardMaterial({ map: featTex })
        );
        featCard.position.y = -0.5;
        ceilingCard.add(featCard);
        scene.add(ceilingCard);
        
        // Character
        const char = new THREE.Group();
        char.position.set(-3, 0, -3);
        char.userData = { type: 'character' };
        char.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,1), new THREE.MeshStandardMaterial({color:0xff3e41})));
        char.children[0].position.y = 0.5;
        char.add(new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({color:0xffde37})));
        char.children[1].position.y = 1.1;
        scene.add(char);
        
        // Tap to interact
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        renderer.domElement.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(scene.children, true);
            if (hits.length > 0) {
                const obj = hits[0].object;
                if (obj.userData.type === 'card') {
                    const card = cardData[obj.userData.cardId];
                    if (card) {
                        document.getElementById('card-title').textContent = card.title;
                        document.getElementById('card-series').textContent = card.series;
                        document.getElementById('card-value').textContent = card.value.toFixed(2);
                        document.getElementById('card-details').style.display = 'block';
                        clearTimeout(window._t);
                        window._t = setTimeout(() => {
                            document.getElementById('card-details').style.display = 'none';
                        }, 4000);
                    }
                } else if (obj.userData.type === 'character' || obj.parent?.userData?.type === 'character') {
                    char.rotation.y += Math.PI;
                }
            }
        });
        
        // ====================================
        // REAL WALKING - NO ARROWS, NO BUTTONS
        // ====================================
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        // Use DeviceMotion for walking (accelerometer)
        // and DeviceOrientation for looking around
        
        let initOrientation = null;
        let lastAccel = { x: 0, y: 0, z: 0 };
        let velocity = { x: 0, z: 0 };
        const walkScale = 0.003; // How fast real steps translate to world movement
        
        function requestPermissions() {
            if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
                return DeviceOrientationEvent.requestPermission();
            }
            return Promise.resolve('granted');
        }
        
        function startSensors() {
            // DeviceOrientation = look around
            window.addEventListener('deviceorientation', (e) => {
                if (e.alpha === null) return;
                if (!initOrientation) {
                    initOrientation = { alpha: e.alpha, beta: e.beta };
                }
                
                const yaw = (e.alpha - initOrientation.alpha) * (Math.PI / 180);
                const pitch = (e.beta - initOrientation.beta) * (Math.PI / 360);
                
                camera.rotation.set(
                    Math.max(-0.8, Math.min(0.8, pitch)),
                    yaw,
                    0
                );
            });
            
            // DeviceMotion = walk
            window.addEventListener('devicemotion', (e) => {
                const accel = e.accelerationIncludingGravity;
                if (!accel || accel.x === null) return;
                
                // Detect step motion from accelerometer
                // Walking creates a distinct acceleration pattern
                const dx = accel.x - lastAccel.x;
                const dz = accel.z - lastAccel.z;
                
                // Only register significant movement (actual steps)
                if (Math.abs(dx) > 0.5 || Math.abs(dz) > 0.5) {
                    // Move in the direction the phone is facing
                    const angle = camera.rotation.y;
                    
                    // Forward/backward movement from z-axis
                    camera.position.x -= Math.sin(angle) * dz * walkScale;
                    camera.position.z -= Math.cos(angle) * dz * walkScale;
                    
                    // Side-to-side movement from x-axis
                    camera.position.x -= Math.cos(angle) * dx * walkScale;
                    camera.position.z += Math.sin(angle) * dx * walkScale;
                    
                    // Clamp to room
                    camera.position.x = Math.max(-7, Math.min(7, camera.position.x));
                    camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
                }
                
                lastAccel = { x: accel.x, y: accel.y, z: accel.z };
            });
        }
        
        // Enter button - start the experience
        document.getElementById('enter-button').addEventListener('click', async () => {
            document.getElementById('enter-button').style.display = 'none';
            
            if (isMobile) {
                const perm = await requestPermissions();
                if (perm === 'granted') {
                    document.getElementById('recalibrate-btn').style.display = 'block';
                    startSensors();
                }
            }
        });
        
        // Recalibrate button
        document.getElementById('recalibrate-btn').addEventListener('click', () => {
            initOrientation = null;
            lastAccel = { x: 0, y: 0, z: 0 };
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            ceilingCard.rotation.y += 0.008;
            stars.rotation.y += 0.0001;
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('🚶 Real walking mode active');
        console.log('📱 Tilt phone to look');
        console.log('🚶 Walk in real life to move in the gallery');
        console.log('🎯 Tap top-right button to recalibrate');
    </script>
</body>
</html>
