<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPK ULTRA 3D | Premium Art Gallery Experience</title>
    <!-- Use A-Frame 1.5.0 for stability -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Movement controls for smooth WASD navigation -->
    <script src="https://unpkg.com/aframe-movement-controls@1.3.0/dist/aframe-movement-controls.min.js"></script>
    <!-- Environment component for starry sky -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.0/dist/aframe-environment-component.min.js"></script>
    <!-- Event set for interactions -->
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Bangers', cursive;
        }
        #enter-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 40px;
            background: linear-gradient(135deg, #ff3e41, #d32f2f);
            color: #ffde37;
            border: 4px solid #ffffff;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            border-radius: 60px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px #ffde37;
            font-family: 'Bangers', cursive;
            letter-spacing: 3px;
            transition: transform 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(4px);
        }
        #enter-btn:hover {
            transform: translateX(-50%) scale(1.07);
            box-shadow: 0 0 40px rgba(255,222,55,0.6);
        }
        .ui-panel {
            position: fixed;
            background: rgba(10, 10, 20, 0.92);
            backdrop-filter: blur(12px);
            border-right: 5px solid #ffde37;
            border-top: 1px solid #ffde37;
            border-radius: 16px;
            padding: 18px 24px;
            z-index: 10000;
            color: white;
            width: 280px;
            font-family: 'Bangers', cursive;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: opacity 0.25s ease;
        }
        #card-details {
            bottom: 30px;
            right: 30px;
            left: auto;
            top: auto;
            display: none;
            text-shadow: 1px 1px 0px #000;
        }
        .ui-panel h2 {
            color: #ffde37;
            margin: 0 0 12px 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        .ui-panel p {
            margin: 10px 0;
            font-size: 1.3rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .instruction {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            color: #ffde37;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10000;
            backdrop-filter: blur(5px);
            border-left: 3px solid #ffde37;
        }
        @media (max-width: 700px) {
            .instruction { font-size: 10px; bottom: 12px; left: 12px; }
            .ui-panel { width: 220px; padding: 12px 16px; }
            .ui-panel h2 { font-size: 1.5rem; }
            .ui-panel p { font-size: 1rem; }
            #enter-btn { font-size: 1.4rem; padding: 12px 28px; bottom: 25px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>
<body>
    <button id="enter-btn">✨ ENTER ART GALLERY ✨</button>
    
    <div id="card-details" class="ui-panel">
        <h2>🎨 MASTERPIECE INFO</h2>
        <p><strong>🏆 TITLE:</strong> <span id="card-title"></span></p>
        <p><strong>📀 SERIES:</strong> <span id="card-series"></span></p>
        <p><strong>💰 EST. VALUE:</strong> $<span id="card-value"></span></p>
    </div>
    <div class="instruction">🖱️ CLICK TO LOCK | WASD / ARROWS TO MOVE | 🖱️ CLICK CARDS FOR DETAILS</div>

    <a-scene 
        vr-mode-ui="enabled: true" 
        background="color: #030318"
        renderer="colorManagement: true; antialias: true"
        keyboard-shortcuts="enterVR: false"
        shadow="enabled: false"
    >
        <!-- ENHANCED ENVIRONMENT: starry sky with custom bright stars + ground floor grid -->
        <a-entity environment="preset: starry; groundColor: #151525; grid: cross; gridColor: #ffcc44; groundY: -0.1; groundTexture: none; starDensity: 0.95; starSize: 0.8"></a-entity>
        
        <!-- CUSTOM BRIGHT COLORFUL STARS PARTICLE SYSTEM - to make sky pop -->
        <a-entity id="colorful-stars" position="0 8 -12">
            <a-particle-system 
                preset="stardust" 
                color="#ff3366, #ffde37, #44ffaa, #ff9933, #aa66ff" 
                particleCount="400" 
                size="0.25"
                opacity="0.9"
                drift="0.2"
                accelerationY="0.05"
                rotationSpeed="0.02"
                direction="random"
                lifetime="8"
                speed="0.4"
            ></a-particle-system>
        </a-entity>
        
        <!-- Extra floating glitter stars for magical gallery vibe -->
        <a-entity position="0 5 -8">
            <a-particle-system 
                preset="snow" 
                color="#ffdd77, #ffaa44, #ffee88, #77aaff" 
                particleCount="250" 
                size="0.15"
                opacity="0.7"
                speed="0.2"
                drift="0.1"
                rotationSpeed="0.01"
                direction="up"
            ></a-particle-system>
        </a-entity>
        
        <!-- Main Gallery Floor (luxurious reflective finish) -->
        <a-plane 
            id="gallery-floor"
            position="0 -0.08 0" 
            rotation="-90 0 0" 
            width="24" 
            height="24" 
            color="#1a1a2e" 
            roughness="0.3" 
            metalness="0.7"
            receive-shadow="false"
            material="side: double; transparent: false; opacity: 1">
        </a-plane>
        
        <!-- Elegant grid overlay to enhance depth perception -->
        <a-grid 
            position="0 0 0" 
            rotation="-90 0 0" 
            width="22" 
            height="22" 
            divisions="24" 
            color="#ffdd99" 
            opacity="0.4"
            material="side: double">
        </a-grid>
        
        <!-- Decorative gallery columns / subtle ambient markers -->
        <a-cylinder position="-4.5 1.2 -4.8" radius="0.2" height="2.5" color="#c0a070" metalness="0.4" roughness="0.6"></a-cylinder>
        <a-cylinder position="4.5 1.2 -4.8" radius="0.2" height="2.5" color="#c0a070" metalness="0.4"></a-cylinder>
        <a-cylinder position="-4.5 1.2 4.8" radius="0.2" height="2.5" color="#c0a070"></a-cylinder>
        <a-cylinder position="4.5 1.2 4.8" radius="0.2" height="2.5" color="#c0a070"></a-cylinder>
        
        <!-- Camera Rig with movement controls (eye-level at 1.7m height, perfect for art viewing) -->
        <a-entity id="rig" 
                  movement-controls="speed: 1.3; constrainToNavMesh: false; enableJump: false; fly: false"
                  position="0 1.7 0">
            <a-entity camera="fov: 80" look-controls="pointerLockEnabled: true" position="0 1.65 0">
                <!-- Laser-like cursor for precise card selection -->
                <a-entity cursor="fuse: false; rayOrigin: mouse"
                          position="0 0 -0.9"
                          geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.022"
                          material="color: #ffde37; shader: flat; opacity: 0.95; emissive: #ffaa33"
                          raycaster="objects: .card; far: 12; interval: 40">
                </a-entity>
            </a-entity>
        </a-entity>

        <!-- ========= WALL CARDS RAISED HIGHER (eye-level art display ~1.6m to 1.9m center) ========= -->
        <!-- Each card group is positioned so the card center is at 1.7m from floor (art gallery standard) -->
        
        <!-- NORTH WALL (z = -4.5) - Cards at Y: 0.9 to 2.3 range, center 1.6 -->
        <a-entity id="north-wall" position="0 1.7 -4.6" rotation="0 0 0">
            <!-- Card 1 (left) -->
            <a-entity class="card" position="-2.1 0.4 0.08" rotation="0 0 0" data-card="1">
                <a-image src="#card1" width="0.95" height="1.3" transparent="true" material="shader: standard; emissive: #221100; emissiveIntensity: 0.2"></a-image>
            </a-entity>
            <!-- Card 2 (center) -->
            <a-entity class="card" position="0 0.4 0.08" rotation="0 0 0" data-card="2">
                <a-image src="#card2" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <!-- Card 3 (right) -->
            <a-entity class="card" position="2.1 0.4 0.08" rotation="0 0 0" data-card="3">
                <a-image src="#card3" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
        </a-entity>

        <!-- EAST WALL (x = 4.6) rotated to face inward -->
        <a-entity id="east-wall" position="4.6 1.7 0" rotation="0 -90 0">
            <a-entity class="card" position="-2.1 0.4 0.08" rotation="0 0 0" data-card="4">
                <a-image src="#card4" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <a-entity class="card" position="0 0.4 0.08" rotation="0 0 0" data-card="5">
                <a-image src="#card5" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <a-entity class="card" position="2.1 0.4 0.08" rotation="0 0 0" data-card="6">
                <a-image src="#card6" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
        </a-entity>

        <!-- SOUTH WALL (z = 4.6) -->
        <a-entity id="south-wall" position="0 1.7 4.6" rotation="0 180 0">
            <a-entity class="card" position="-2.1 0.4 0.08" rotation="0 0 0" data-card="7">
                <a-image src="#card7" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <a-entity class="card" position="0 0.4 0.08" rotation="0 0 0" data-card="8">
                <a-image src="#card8" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <a-entity class="card" position="2.1 0.4 0.08" rotation="0 0 0" data-card="9">
                <a-image src="#card9" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
        </a-entity>

        <!-- WEST WALL (x = -4.6) -->
        <a-entity id="west-wall" position="-4.6 1.7 0" rotation="0 90 0">
            <a-entity class="card" position="-2.1 0.4 0.08" rotation="0 0 0" data-card="10">
                <a-image src="#card10" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <a-entity class="card" position="0 0.4 0.08" rotation="0 0 0" data-card="11">
                <a-image src="#card11" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
            <a-entity class="card" position="2.1 0.4 0.08" rotation="0 0 0" data-card="12">
                <a-image src="#card12" width="0.95" height="1.3" transparent="true"></a-image>
            </a-entity>
        </a-entity>

        <!-- ========= CEILING / OVERHEAD FEATURED CARDS (RAISED HIGH, NO FLOATING IN FACE) ========= -->
        <!-- Center masterpiece suspended at 3.6m height, rotates slowly, well above eye level -->
        <a-entity position="0 3.7 0" rotation="-8 0 0" animation="property: rotation; to: -8 360 0; loop: true; dur: 55000; easing: linear">
            <a-image src="#featured1" width="1.5" height="2.0" transparent="true" material="side: double; emissive: #331a00; emissiveIntensity: 0.15"></a-image>
        </a-entity>
        
        <!-- Four corner hanging gallery pieces at height 3.4m - well above head, no obstruction -->
        <a-entity position="-3.5 3.5 -3.5" rotation="-6 45 0" animation="property: rotation; to: -6 405 0; loop: true; dur: 62000; easing: linear">
            <a-image src="#featured2" width="1.2" height="1.7" transparent="true"></a-image>
        </a-entity>
        
        <a-entity position="3.5 3.5 -3.5" rotation="-6 -45 0" animation="property: rotation; to: -6 -405 0; loop: true; dur: 58000; easing: linear">
            <a-image src="#featured3" width="1.2" height="1.7" transparent="true"></a-image>
        </a-entity>
        
        <a-entity position="3.5 3.5 3.5" rotation="-6 -135 0" animation="property: rotation; to: -6 -495 0; loop: true; dur: 64000; easing: linear">
            <a-image src="#featured4" width="1.2" height="1.7" transparent="true"></a-image>
        </a-entity>
        
        <a-entity position="-3.5 3.5 3.5" rotation="-6 135 0" animation="property: rotation; to: -6 495 0; loop: true; dur: 60000; easing: linear">
            <a-image src="#featured5" width="1.2" height="1.7" transparent="true"></a-image>
        </a-entity>
        
        <!-- Additional Gallery Lighting: warm spots to highlight card artworks -->
        <a-light type="ambient" color="#302040" intensity="0.55"></a-light>
        <a-light type="directional" color="#ffdd99" intensity="0.7" position="3 6 2" cast-shadow="false"></a-light>
        <a-light type="point" intensity="0.8" color="#ffaa66" position="0 2.8 0" distance="9" decay="1.2"></a-light>
        <a-light type="point" intensity="0.5" color="#cc88ff" position="-2 2.5 3"></a-light>
        <a-light type="point" intensity="0.5" color="#88ccff" position="2 2.5 -3"></a-light>
        
        <!-- Spotlights aimed at each wall for dramatic effect -->
        <a-light type="spot" intensity="0.65" angle="35" position="0 3.2 -3.8" target="#north-wall" color="#ffdd99"></a-light>
        <a-light type="spot" intensity="0.65" angle="35" position="3.8 3.2 0" target="#east-wall" color="#ffccaa"></a-light>
        <a-light type="spot" intensity="0.65" angle="35" position="0 3.2 3.8" target="#south-wall" color="#ffdd99"></a-light>
        <a-light type="spot" intensity="0.65" angle="35" position="-3.8 3.2 0" target="#west-wall" color="#ffccaa"></a-light>

        <!-- ========= ASSETS (Card Images with fallback placeholders) ========= -->
        <a-assets>
            <!-- 12 Wall Cards - using original file names + robust fallback -->
            <img id="card1" src="PompaPaulie.png" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%233d1f2a\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'20\'%3EGPK%20ULTRA%3C/text%3E%3C/svg%3E'">
            <img id="card2" src="20250503011555.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%232b1f3d\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffcc44\' font-size=\'18\'%3E3D%20BLAST%3C/text%3E%3C/svg%3E'">
            <img id="card3" src="Os10_custom_wrapper.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%233d2a1f\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'18\'%3EOS10%20WRAP%3C/text%3E%3C/svg%3E'">
            <img id="card4" src="20250503012558.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%232f2a3d\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffaa55\' font-size=\'16\'%3EHOLO%20SHIFT%3C/text%3E%3C/svg%3E'">
            <img id="card5" src="20250503022823.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%23212c3a\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'16\'%3ERARE%20GLOW%3C/text%3E%3C/svg%3E'">
            <img id="card6" src="20250503032454.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%233a1f2c\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffcc66\' font-size=\'16\'%3ENIGHTMARE%3C/text%3E%3C/svg%3E'">
            <img id="card7" src="20250503034156.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%23352c1f\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'16\'%3EGOLDEN%20DEMON%3C/text%3E%3C/svg%3E'">
            <img id="card8" src="20250503035601.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%232c3a2f\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'16\'%3ECHROME%20ZOMBIE%3C/text%3E%3C/svg%3E'">
            <img id="card9" src="Os9_custom_wrapper.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%23402a3a\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'16\'%3EOS9%20LEGACY%3C/text%3E%3C/svg%3E'">
            <img id="card10" src="Os10_custom_wrapper.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%233d2f1f\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'16\'%3EULTRA%20ED%3C/text%3E%3C/svg%3E'">
            <img id="card11" src="20250503012558.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%232a2a3d\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffcc77\' font-size=\'16\'%3ESPARKLE%20ART%3C/text%3E%3C/svg%3E'">
            <img id="card12" src="PompaPaulie.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 280\'%3E%3Crect width=\'200\' height=\'280\' fill=\'%233a2c2f\'/%3E%3Ctext x=\'20\' y=\'140\' fill=\'%23ffde37\' font-size=\'16\'%3EPOMPA%20PROTO%3C/text%3E%3C/svg%3E'">
            
            <!-- Featured overhead art images -->
            <img id="featured1" src="PompaPaulie.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 400\'%3E%3Crect width=\'300\' height=\'400\' fill=\'%23aa3344\'/%3E%3Ctext x=\'30\' y=\'200\' fill=\'%23ffdd77\' font-size=\'28\'%3ECENTERPIECE%3C/text%3E%3C/svg%3E'">
            <img id="featured2" src="20250503011555.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 400\'%3E%3Crect width=\'300\' height=\'400\' fill=\'%234477aa\'/%3E%3Ctext x=\'30\' y=\'200\' fill=\'%23ffde37\' font-size=\'24\'%3EGALLERY%20STAR%3C/text%3E%3C/svg%3E'">
            <img id="featured3" src="Os10_custom_wrapper.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 400\'%3E%3Crect width=\'300\' height=\'400\' fill=\'%23aa7744\'/%3E%3Ctext x=\'30\' y=\'200\' fill=\'%23ffffaa\' font-size=\'24\'%3ECOSMIC%20WRAP%3C/text%3E%3C/svg%3E'">
            <img id="featured4" src="20250503012558.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 400\'%3E%3Crect width=\'300\' height=\'400\' fill=\'%2355aa77\'/%3E%3Ctext x=\'30\' y=\'200\' fill=\'%23ffdd77\' font-size=\'24\'%3EHOLO%20VISION%3C/text%3E%3C/svg%3E'">
            <img id="featured5" src="20250503022823.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 400\'%3E%3Crect width=\'300\' height=\'400\' fill=\'%23dd8844\'/%3E%3Ctext x=\'30\' y=\'200\' fill=\'%23ffffcc\' font-size=\'24\'%3ERARE%20DISPLAY%3C/text%3E%3C/svg%3E'">
        </a-assets>
    </a-scene>

    <script>
        // Card metadata (art collection)
        const cardData = {
            "1": { title: "POMPA PAULIE", series: "ULTRA 3D Genesis", value: 150.00 },
            "2": { title: "COSMIC BLASTER", series: "2025 Neo", value: 125.00 },
            "3": { title: "OS10 CUSTOM WRAPPER", series: "Vintage Archive", value: 200.00 },
            "4": { title: "HOLO SHIFT", series: "3D Ultra", value: 175.00 },
            "5": { title: "PHANTOM GLOW", series: "Rare Edition", value: 225.00 },
            "6": { title: "NIGHTMARE FUEL", series: "Collector's Vault", value: 250.00 },
            "7": { title: "GOLDEN DEMON", series: "Limited Run", value: 275.00 },
            "8": { title: "CHROME ZOMBIE", series: "Ultra 3D Foil", value: 300.00 },
            "9": { title: "OS9 LEGACY WRAP", series: "Vintage Special", value: 350.00 },
            "10": { title: "DIMENSIONAL RIP", series: "Ultra 3D", value: 400.00 },
            "11": { title: "FIRST EDITION SPARKLE", series: "Vintage Platinum", value: 450.00 },
            "12": { title: "PAULIE PROTOTYPE", series: "Grail Series", value: 500.00 }
        };

        let detailsTimeout = null;
        const panel = document.getElementById('card-details');
        const titleSpan = document.getElementById('card-title');
        const seriesSpan = document.getElementById('card-series');
        const valueSpan = document.getElementById('card-value');

        function showCardDetails(cardId) {
            const card = cardData[cardId];
            if (!card) return;
            titleSpan.textContent = card.title;
            seriesSpan.textContent = card.series;
            valueSpan.textContent = card.value.toFixed(2);
            
            if (panel.style.display === 'block') {
                if (detailsTimeout) clearTimeout(detailsTimeout);
            } else {
                panel.style.display = 'block';
                panel.style.opacity = '0';
                setTimeout(() => panel.style.opacity = '1', 30);
            }
            if (detailsTimeout) clearTimeout(detailsTimeout);
            detailsTimeout = setTimeout(() => {
                panel.style.opacity = '0';
                setTimeout(() => {
                    panel.style.display = 'none';
                    panel.style.opacity = '1';
                }, 250);
            }, 5000);
        }

        function setupInteractions() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = card.getAttribute('data-card');
                    if (id) showCardDetails(id);
                    card.setAttribute('animation__click', {
                        property: 'scale', to: '1.1 1.1 1.1', dur: 150, easing: 'easeOutQuad', dir: 'alternate'
                    });
                    setTimeout(() => card.removeAttribute('animation__click'), 200);
                });
                card.addEventListener('mouseenter', () => {
                    card.setAttribute('animation__hover', { property: 'scale', to: '1.05 1.05 1.05', dur: 120 });
                });
                card.addEventListener('mouseleave', () => {
                    card.setAttribute('animation__hoverback', { property: 'scale', to: '1 1 1', dur: 150 });
                });
            });
            console.log(`✨ Gallery Ready: ${cards.length} artworks at perfect eye level`);
        }

        document.getElementById('enter-btn').addEventListener('click', () => {
            document.getElementById('enter-btn').style.display = 'none';
            // Focus canvas for pointer lock
            const canvas = document.querySelector('canvas');
            if (canvas) canvas.click();
            setTimeout(setupInteractions, 400);
            // recenter camera
            const rig = document.getElementById('rig');
            if (rig) rig.object3D.position.set(0, 1.7, 0);
        });

        window.addEventListener('load', () => {
            console.log("🏛️ GPK Ultra Gallery — Elevated art display, colorful stars, no face-blocking cards.");
        });
